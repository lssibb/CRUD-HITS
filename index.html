<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>crud-hits</title>
  </head>
<body>
  <h1>Напитки</h1>

  <!-- Форма создания -->
  <section id="create-section">
    <input id="drink-name" type="text" placeholder="Название напитка" />
    <select id="element-select">
    <option value="water">Вода</option>
    <option value="coffee">Кофейное зерно</option>
    <option value="milk">Молоко</option>
    <option value="syrup">Сироп</option>
    <option value="ice">Лёд</option>
    <option value="add">Добавить</option>
    <option value="boil">Вскипятить</option>
    <option value="grind">Перемолоть</option>
    <option value="mix">Перемешать</option>
    <option value="pour">Налить</option>
    <option value="whip">Взбить</option>
</select>
<input id="weight-input" type="number" placeholder="Масса (г)" />
<button id="btn-add-element">Добавить элемент</button>

    <button id="btn-create">Создать</button>
  </section>
<section id="current-drink"></section>
  <!-- Список напитков -->
  <section id="drinks-list"></section>

  <!-- Детали выбранного напитка -->
  <section id="drink-detail"></section>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
